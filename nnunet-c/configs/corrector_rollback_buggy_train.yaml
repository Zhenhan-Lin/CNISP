# ── nnUNet-C corrector BUGGY-DATA TRAIN config (Dataset865) ──────────────
# Trains a FRESH corrector on the PRE-FIX (buggy) CNISP native-mapping prelabels,
# fully isolated from the fixed rollback (Dataset845) so the two can be A/B'd.
# It is a clone of corrector_rollback.yaml (stock nnUNetTrainer, 200 samples,
# steps 3/6/9) with ONLY the isolation knobs changed:
#   * controls.C.dataset_id   -> 865  (+ name PHOTON_CT_CORR_C_cnisp_buggy) so the
#                                raw/preprocessed/results NEVER touch the fixed 845
#   * cnisp_pred_dirname       -> cnisp_pred_buggy   (buggy CNISP masks, flat
#                                {case}_step{XX}.nii.gz -- the ch1..4 source in
#                                --prelabel-grid native, matching the fixed 845 build)
#   * run_tag                  -> corrector_gt_buggy (isolated CNISP run dir)
# (cnisp_train_iso_pred_dirname / cnisp_iso_pred_dirname below are only used by the
#  default --prelabel-grid iso path; the fixed 845 was built with --prelabel-grid
#  native, so they're UNUSED here. Kept only for parity / if you switch to iso.)
#
# WORKFLOW (mirrors how the fixed 845 was built: CNISP masks in the pred folder,
# built with --prelabel-grid native).
# 1) Produce the BUGGY masks into cnisp_pred_buggy (buggy mapping + resume-from-latent;
#    NO iso emit needed for native-grid build). OUT_DIR routes the masks; the config
#    only tells the CONSUMERS where to read.
#      OUT_DIR=nnunet-c/data/cnisp_pred_buggy EMIT_ISO=0 \
#      CNISP_BUGGY_NATIVE_MAPPING=1 REMAP_FROM_LATENT=1 STEPS=3,6,9 \
#      CONFIG=nnunet-c/configs/corrector_rollback_buggy_train.yaml \
#      bash nnunet-c/run_corrector_cnisp.sh
#    (You already copied cnisp_pred/latent -> cnisp_pred_buggy/latent, so resume finds
#     the latents there and only re-decodes+re-maps them with the buggy mapping.)
# 2) Build + train (ch1..4 = cnisp_pred_buggy via --prelabel-grid native; stock
#    nnUNetTrainer + nnUNetPlansFinetune -> only diff vs Dataset845 is the mapping):
#      python nnunet-c/scripts/build_corrector_dataset.py \
#          --config nnunet-c/configs/corrector_rollback_buggy_train.yaml \
#          --control C --max-samples 200 --prelabel-grid native
#      SKIP_PREPROCESS=0 PREPROCESS_NP=2 \
#          CONFIG=nnunet-c/configs/corrector_rollback_buggy_train.yaml \
#          bash nnunet-c/run_train.sh C 0

nnunet_config_yaml: nnunet/configs_v7.yaml

experiment: thick

cnisp_model_name: orbital_ad_v6_5_gt
cnisp_train_yaml: train_v6_5_gt.yaml
cnisp_test_yaml: test_corrector.yaml
# Isolated CNISP run dir so the buggy run never overwrites the fixed corrector_gt.
run_tag: corrector_gt_buggy

nnunet_pred_root: null
degraded_ct_root: null

reference_dataset_id: 835
reference_dataset_name: PHOTON_CT_QAfiltered
reference_plan: nnUNetPlans
reference_plan_json: nnUNetPlans_iso05
configuration: 3d_fullres
trainer: nnUNetTrainer
reference_fold: 2

# ── Corrector finetune schedule — DEFAULT (stock nnUNetTrainer) ───────
# Same as the fixed rollback: stock nnUNetTrainer (1000 epochs, lr 1e-2). Keeping
# the trainer/plan identical to the fixed run is what makes this a clean ablation
# of the native-mapping fix (only the ch1..4 mapping/data differ). epochs/lr below
# are IGNORED by the stock trainer (they only apply to nnUNetTrainer_corrector).
finetune:
  trainer: nnUNetTrainer
  epochs: 1000
  initial_lr: 0.01

predict:
  grid: iso
  iso_mm: 0.4765625     # 835 iso plan spacing (matches the builder + network plan)
  run_cnisp: auto
  emit_iso: auto

target_spacing: null

structures: [ON, Recti, Globe, Fat]
labels:
  background: 0
  optic_nerve: 1
  recti_muscles: 2
  globe: 3
  orbital_fat: 4

corrector_train_split: nnunet-c/splits/corrector_train.txt
corrector_train_casefile: corrector_train_cases.txt

corrector_data:
  checklist_csv: /fs5/p_masi/linz18/QA_record/QA/PHOTON_CP/new_check/review_checklist_part2.csv
  select:
    keep: false
    qa_status: yes
  # ROLLBACK "200" = MAX_SAMPLES at raw-build: build with --max-samples 200 to cap
  # Dataset865 to the first 200 (case,step) (control-independent: needs nnunet_pred
  # AND cnisp_pred_buggy, so it matches the fixed 845's 200 by construction).
  target_samples: null
  n: 200
  # ROLLBACK steps 3/6/9 (12 dropped); build_corrector_dataset reads this as its
  # default step filter, so step 12 is dropped at raw-build time.
  steps: [3, 6, 9]
  thick_threshold_mm: 7.0
  thick_threshold_steps: [9]
  modality: ct
  data_root: nnunet-c/data
  images_dirname: images
  nnunet_pred_dirname: nnunet_pred
  # ── BUGGY input dirs (isolated from the fixed cnisp_pred / *_iso) ──
  # cnisp_pred_buggy holds the buggy CNISP masks (flat {case}_step{XX}.nii.gz) --
  # the ch1..4 source under --prelabel-grid native (how the fixed 845 was built).
  cnisp_pred_dirname: cnisp_pred_buggy
  # The two iso dirnames below are ONLY read by the default --prelabel-grid iso
  # path; UNUSED for the native-grid build above. Kept isolated (*_buggy) for parity
  # in case you switch to iso mode later.
  cnisp_iso_pred_dirname: cnisp_pred_test_iso_buggy
  cnisp_train_iso_pred_dirname: cnisp_pred_train_iso_buggy
  aligned_patch_dirname: aligned_patch

controls:
  A:
    dataset_id: 835
    dataset_name: PHOTON_CT_QAfiltered
    prelabel_source: none
    n_channels: 1
    external: true
  B:
    dataset_id: 855
    dataset_name: PHOTON_CT_CORR_B_stacked
    prelabel_source: nnunet
    n_channels: 5
    external: false
  C:
    # Dataset865 = buggy-data corrector, kept SEPARATE from the fixed 845 so both
    # models coexist for the A/B comparison.
    dataset_id: 865
    dataset_name: PHOTON_CT_CORR_C_cnisp_buggy
    prelabel_source: cnisp
    n_channels: 5
    external: false
