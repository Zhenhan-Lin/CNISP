# ── nnUNet-C "corrector" experiment configuration ────────────────────
# Drives build_dataset / adapt_checkpoint / build_finetune_plan / predict for
# the three controls A/B/C. ONE codebase; controls differ only by the entries
# under `controls:` (prelabel source + dataset id + channel count).

# Reuse the nnUNet-vs-CNISP comparison config for shared paths: work_dir,
# cnisp_paths_yaml, Dataset835 identity, atlas/pivot CT discovery, etc.
# Path is relative to the repo root (resolved by lib/config.py).
nnunet_config_yaml: nnunet/configs_v7.yaml

# ── Experiment / degradation mode ────────────────────────────────────
# Must match the sparse sweep + CNISP run the prelabels were produced under.
experiment: thick

# ── CNISP retrain (Stage 2, GT observations) ─────────────────────────
# The GT-obs CNISP whose test-optimization produces control-C prelabels.
cnisp_model_name: orbital_ad_v6_5_gt
cnisp_train_yaml: train_v6_5_gt.yaml      # obs_sources: [gt]  (architecture -t)
cnisp_test_yaml: test_corrector.yaml      # shared test-opt settings (-c), Stage 3
# CNISP inference run_tag: runs/<experiment>/<run_tag>/ holds the prelabels.
run_tag: corrector_gt

# ── Single nnUNet prediction feeding BOTH B and C (Detail 2) ─────────
# Resolved under work_dir when null. Predictions live at:
#   {nnunet_pred_root}/{experiment}/sparse_step_{XX}/{sid}.nii.gz          (raw; CNISP/C fits to its canonical form)
#   {nnunet_pred_root}/{experiment}/sparse_step_{XX}_native/{sid}.nii.gz   (B prelabel, native grid)
nnunet_pred_root: null            # null -> "{work_dir}/prediction"

# Degraded CT (ch0) input root; null -> "{work_dir}/input".
degraded_ct_root: null            # null -> "{work_dir}/input"

# ── Reference (Dataset835) for finetune weight transfer + plan merge ──
# Confirm the ACTUAL plan folder name on the GPU box (nnUNetPlans vs
# nnUNetPlans_iso05) before running run_train.sh.
reference_dataset_id: 835
reference_dataset_name: PHOTON_CT_QAfiltered
# reference_plan = the 835 RESULTS/checkpoint folder plan name
# (nnUNetTrainer__<reference_plan>__3d_fullres/), used for nnUNetv2_predict -p and
# to locate the pretrained checkpoint.
reference_plan: nnUNetPlans
# reference_plan_json = the preprocessed plan JSON we MERGE parameters from
# (835 was trained ISO 0.5 -> use the iso05 plan for spacing/architecture/ch0
# intensity stats). Only its PARAMETERS are copied; its name is never used for
# prediction/checkpoint lookup.
reference_plan_json: nnUNetPlans_iso05
configuration: 3d_fullres
trainer: nnUNetTrainer
reference_fold: 2

# Build everything on each image's ORIGINAL native grid (label = GT shared across
# step 3/6/9; ch1-4 = CNISP native mask; ch0 upsampled to it). nnUNet then
# resamples original -> iso 0.5 (nnUNetPlans_iso05) at preprocess, using the
# per-channel resampler (ch0 order 3, ch1-4 order 0) so the binary prelabels stay
# {0,1}. target_spacing unused by the builder in this mode; kept null.
target_spacing: null

# ── Label scheme (fixed channel order for ch1..ch4) ──────────────────
# channel index 1..4 corresponds to structures[0..3].
structures: [ON, Recti, Globe, Fat]
labels:
  background: 0
  optic_nerve: 1
  recti_muscles: 2
  globe: 3
  orbital_fat: 4

# ── Splits ───────────────────────────────────────────────────────────
# corrector training set: source_ids, one per line (e.g. chk_14455).
# Relative to repo root. CNISP train/val/test come from casefiles_dir
# (orbital_shape_prior_st1 paths.yaml); the test set is unified to CNISP's
# test_cases.txt for ALL controls.
corrector_train_split: nnunet-c/splits/corrector_train.txt
# Derived casenames file written under casefiles_dir for the CNISP/nnUNet
# machinery (which is casename-based, not source_id-based).
corrector_train_casefile: corrector_train_cases.txt

# ── Corrector training data generation (CSV-driven, self-contained) ──
# Replaces the source_id split for the corrector TRAINING set: select images
# from a QA checklist, degrade them (thick) at several step sizes, predict with
# the 835 nnUNet, and (later) CNISP. All artifacts live under data_root so the
# corrector reads from one place.
corrector_data:
  # QA checklist CSV (relative to repo root or absolute).
  checklist_csv: /fs5/p_masi/linz18/QA_record/QA/PHOTON_CP/new_check/review_checklist_part2.csv
  # Selection: keep == False AND qa_status == "yes"; take the first `n` images
  # (in file order) whose source image actually exists on disk.
  select:
    keep: false
    qa_status: yes
  n: 200
  # Thick degradation step sizes. For steps listed in thick_threshold_steps,
  # drop that (case, step) variant if resulting slice thickness
  # (= through-plane spacing * step) exceeds thick_threshold_mm.
  steps: [3, 6, 9, 12]
  thick_threshold_mm: 10.0          # drop a thresholded step if eff_res (spacing*step) exceeds this
  thick_threshold_steps: [9, 12]
  modality: ct
  # Output tree (relative to repo root): degraded CTs, 835 preds, CNISP preds.
  data_root: nnunet-c/data
  images_dirname: images          # {case}_step{XX}_0000.nii.gz
  nnunet_pred_dirname: nnunet_pred
  cnisp_pred_dirname: cnisp_pred
  # CNISP iso-0.5 TEST prelabels (control C test ch1..4 source under --prelabel-grid
  # iso). Layout: <data_root>/<cnisp_iso_pred_dirname>/native_space_step_XX/
  #   <stem>_cnisp_iso_stepXX.nii.gz + manifest.json. Written by the CNISP test run
  #   (03_infer.py --emit-iso-prelabel-dir / run_corrector_predict.sh EMIT_ISO).
  cnisp_iso_pred_dirname: cnisp_pred_test_iso
  # Corrector CNISP aligned patches live HERE (not the shared CNISP aligned_dir),
  # so the corrector run never touches the CNISP training patch tree. Holds
  # labels_dataset835/, metadata_dataset835/, labels_dataset835_<exp>_step_XX/.
  aligned_patch_dirname: aligned_patch

# ── Controls ─────────────────────────────────────────────────────────
controls:
  A:
    dataset_id: 835
    dataset_name: PHOTON_CT_QAfiltered
    prelabel_source: none          # single-channel degraded CT only
    n_channels: 1
    external: true                 # reuse existing Dataset835; no build/train
  B:
    dataset_id: 855
    dataset_name: PHOTON_CT_CORR_B_stacked
    prelabel_source: nnunet        # ch1..4 = nnUNet one-round prediction
    n_channels: 5
    external: false
  C:
    dataset_id: 845
    dataset_name: PHOTON_CT_CORR_C_cnisp
    prelabel_source: cnisp         # ch1..4 = CNISP prediction
    n_channels: 5
    external: false
