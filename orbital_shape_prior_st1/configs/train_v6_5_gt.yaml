# --- Training configuration (v6-5 GT-obs, for the nnUNet-C corrector) ---
# Retrains CNISP for the corrector experiment using GROUND-TRUTH observations
# only (obs_sources: [gt]); nnUNet's prediction on degraded images is NOT used
# as a training observation. This isolates the shape prior. Identical to
# train_v5_5.yaml except model_name. See train_sty2.yaml for full field docs.
#
# Used by Stage 2 of nnunet-c/run_full_pipeline.sh. The resulting checkpoint
# (model_basedir/orbital_ad_v6_5_gt/) is what Stage 3 test-optimization uses to
# generate control-C prelabels for the corrector_train + test caselists.

# Model identification (set to None for debug runs that don't save)
model_name: orbital_ad_v6_5_gt

# --- Architecture ---
num_classes: 5            # BG + ON + Globe + Fat + Recti
latent_dim: 128
op_num_layers: 8
op_coord_layers: [0, 4]   # layers where coordinates are injected

# --- Data ---
labels_dirname: labels     # subdirectory name under aligned_dir
train_casefile: train_cases.txt
val_fraction: 0.15

num_sparsify_offsets: 4    # ignored under Strategy C; used only for VAL baseline
val_casefile: val_cases.txt

test_fraction: 0.2

# --- Sparsification (synthetic anisotropy for training) ---
degradation_bank:
  modality: ct                      # orbital CT -> box kernel for thick averaging
  modes: [thin, thick]              # both degradation modes in every training run
  target_eff_res_increment_mm: 2.0  # ~half the test sweep density
  max_eff_resolution_mm: 12.0       # cap effective resolution
  offsets_per_setting: 1            # offsets per (mode, step); 1 = no offset augment
  num_classes: 5                    # BG + ON + Globe + Fat + Recti
  cache_dir: null                   # null -> auto: {labels_dir}/../degraded_bank/

  # ── obs_sources: GT only ────────────────────────────────────────
  # [gt] : only degrade(GT_mask). No nnUNet sparse-prediction items. This is
  # the key difference from train_v6_5.yaml (which uses [nnunet]).
  obs_sources: [gt]
  # (kept for parity; unused while obs_sources excludes nnunet)
  nnunet_patch_prefix: labels_dataset835_{exp}_train_step_

  # ── Pool shuffle + scan-disjoint train/valid split ──────────────
  split:
    split_seed: 2          # deterministic scan shuffle
    val_fraction: 0.15     # fraction of SCANS held out for validation
    split_granularity: scan  # scan-disjoint (item-level falls back to scan)

# Per-epoch sampling (Strategy C only)
items_per_epoch: 100        # sample 100 items from the bank each epoch
point_sample_fraction: 0.75 # sample 75% of dense voxels per item

# --- Supervision target (tight-prior objective) ---
train_supervision: dense

# Legacy knobs below are INERT for training while degradation_bank is set.
slice_step_size: 4
slice_step_axis: auto
use_thick_slices: false     # ignored under Strategy C (bank controls thickness)

# --- Sampling ---
num_points_per_example_per_dim_train: 64
batch_size_train: 10
batch_size_val: 1

# --- Loss ---
loss_ce_weight: 1.0
loss_dice_weight: 1.0
dice_class_weights: null

# --- Optimization ---
learning_rate: 1.0e-4      # for network params, scaled by batch_size
learning_rate_lat: 1.0e-3   # for latent codes, NOT scaled by batch_size
lat_reg_lambda: 1.0e-4      # L2 regularization on latent codes
num_epochs: 1000

# --- Logging & checkpointing ---
log_epoch_count: 1
checkpoint_epoch_count: 100
max_num_checkpoints: 5
num_workers: 2
