# --- Training configuration ---

# Model identification (set to None for debug runs that don't save)
model_name: orbital_ad_v1

# --- Architecture ---
num_classes: 5            # BG + ON + Globe + Fat + Recti
latent_dim: 128
op_num_layers: 8
op_coord_layers: [0, 4]   # layers where coordinates are injected

# --- Data ---
labels_dirname: labels     # subdirectory name under aligned_dir
train_casefile: train_cases.txt
val_fraction: 0.15

num_sparsify_offsets: 1
val_casefile: null

test_fraction: 0.2

# --- Sparsification (synthetic anisotropy for training) ---
#
# STRATEGY C (degradation bank — recommended for mixed thin/thick):
#   When `degradation_bank` is present, it overrides slice_step_size /
#   use_thick_slices. Each case generates items for multiple (mode, step)
#   combinations, each with its own latent code.
#
degradation_bank:
  modality: ct                      # "ct" -> box kernel; "mri" -> gaussian/estimated
  modes: [thin, thick]              # both degradation modes in every training run
  target_eff_res_increment_mm: 2.0  # ~3 steps/case (half test density)
  max_eff_resolution_mm: 12.0       # cap effective resolution
  offsets_per_setting: 1            # offsets per (mode, step); 1 = no offset augment
  num_classes: 5                    # BG + ON + Globe + Fat + Recti
  cache_dir: null                   # null -> auto: {output_dir}/degraded_bank/

# Per-epoch sampling (Strategy C only)
items_per_epoch: 100        # sample 100 items from bank each epoch
point_sample_fraction: 0.75 # sample 75% of dense voxels per item

# Legacy sparsification (Strategy A/B — used when degradation_bank is absent)
# slice_step_size: 4
# slice_step_axis: auto
# use_thick_slices: false
slice_step_axis: auto

# --- Sampling ---
# Points per example per dim for training (64^3 = 262144 points total)
num_points_per_example_per_dim_train: 64
batch_size_train: 10
batch_size_val: 1

# --- Loss ---
# Multi-class CE + Dice, following Jansen et al.
loss_ce_weight: 1.0
loss_dice_weight: 1.0
# Per-class Dice weights (null = equal weight)
# Can upweight ON and Recti if needed
dice_class_weights: null

# --- Optimization ---
learning_rate: 1.0e-4      # for network params, scaled by batch_size
learning_rate_lat: 1.0e-3   # for latent codes, NOT scaled by batch_size
lat_reg_lambda: 1.0e-4      # L2 regularization on latent codes
num_epochs: 2000

# --- Logging & checkpointing ---
log_epoch_count: 1
checkpoint_epoch_count: 100
max_num_checkpoints: 5
num_workers: 2
