# --- Training configuration ---

# Model identification (set to None for debug runs that don't save)
model_name: orbital_ad_v6

# --- Architecture ---
num_classes: 5            # BG + ON + Globe + Fat + Recti
latent_dim: 128
op_num_layers: 8
op_coord_layers: [0, 4]   # layers where coordinates are injected

# --- Data ---
labels_dirname: labels     # subdirectory name under aligned_dir
train_casefile: train_cases.txt
val_fraction: 0.15

num_sparsify_offsets: 4    # ignored under Strategy C; used only for VAL baseline
val_casefile: val_cases.txt

test_fraction: 0.2

# --- Sparsification (synthetic anisotropy for training) ---
#
# STRATEGY C (degradation bank — MIXED thin/thick, multi-step):
#   When `degradation_bank` is present it OVERRIDES slice_step_size /
#   use_thick_slices below. Each case generates items for many (mode, step)
#   combinations (thin + thick + dense), each with its own latent code, so a
#   single prior is matched to the variable-mode / variable-sparsity inputs we
#   actually deploy on. This is what train_default.yaml (v1) uses.
#
degradation_bank:
  modality: ct                      # orbital CT -> box kernel for thick averaging
  modes: [thin, thick]              # both degradation modes in every training run
  target_eff_res_increment_mm: 2.0  # ~half the test sweep density
  max_eff_resolution_mm: 12.0       # cap effective resolution
  offsets_per_setting: 1            # offsets per (mode, step); 1 = no offset augment
  num_classes: 5                    # BG + ON + Globe + Fat + Recti
  cache_dir: null                   # null -> auto: {labels_dir}/../degraded_bank/

  # ── nnUNet-obs mixing (v6) ──────────────────────────────────────
  # obs_sources controls which observation types populate the bank:
  #   [gt]          : only degrade(GT_mask)  (original Strategy C).
  #   [gt, nnunet]  : ALSO ingest nnUNet's sparse prediction on the
  #                   degraded CT (4 input types: thin/thick × gt/nnunet).
  # nnUNet items are added only where the on-disk obs patch exists, so this
  # is a no-op until the train-split data-gen has been run (see
  # run_pipeline.sh: nnunet-predict-sweep-train). Each nnUNet item is
  # supervised by the dense GT co-framed into nnUNet's drifted obs window.
  obs_sources: [gt, nnunet]
  # Per-experiment obs patch dir template; {exp} -> thin|thick. Built by
  # nnunet/build_dataset835_sparse_patches.py --split train.
  nnunet_patch_prefix: labels_dataset835_{exp}_train_step_

  # ── Pool shuffle + scan-disjoint train/valid split (v6) ─────────
  # When present, TRAIN and VAL draw from ONE combined modeling pool
  # (train_cases ∪ val_cases) and are split scan-disjoint here, replacing the
  # fixed train/val casefile boundary so the constructed 4-type item pool is
  # what gets split. Remove this block to keep the legacy casefile boundary.
  split:
    split_seed: 2          # deterministic scan shuffle
    val_fraction: 0.15     # fraction of SCANS held out for validation
    split_granularity: scan  # scan-disjoint (item-level falls back to scan)

# Per-epoch sampling (Strategy C only)
items_per_epoch: 100        # sample 100 items from the bank each epoch
point_sample_fraction: 0.75 # sample 75% of dense voxels per item

# --- Supervision target (tight-prior objective) ---
# "observation": fit each item's latent to its own SPARSE observation
#                (original Amiranashvili auto-decoder; the latent can encode
#                degraded/partial shapes).
# "dense"      : fit each item's latent to its own DENSE sub-patch GT while
#                keeping the per-item sparse-centroid 64 mm frame (drift
#                handling unchanged). The latent space then only contains
#                TRUE shapes, so at inference a noisy nnUNet observation is
#                pulled back toward a real shape instead of reproduced. The
#                thin/thick degradation bank is still used — each (mode,
#                step) supplies a different sparse-centroid framing of the
#                same dense target (drift augmentation).
train_supervision: dense

# Legacy knobs below are INERT for training while degradation_bank is set.
# slice_step_size still seeds the single-view VAL dataset baseline.
slice_step_size: 4
# slice_step_axis: "auto" (DEFAULT) picks per-case argmax(patch_spacing);
# each scan is sparsified along its own natural through-plane direction
# after canonical alignment. Legacy mode is int 0/1/2 (uniform RAS axis).
slice_step_axis: auto
use_thick_slices: false     # ignored under Strategy C (bank controls thickness)

# --- Sampling ---
# Points per example per dim for training (64^3 = 262144 points total)
num_points_per_example_per_dim_train: 64
batch_size_train: 10
batch_size_val: 1

# --- Loss ---
# Multi-class CE + Dice, following Jansen et al.
loss_ce_weight: 1.0
loss_dice_weight: 1.0
# Per-class Dice weights (null = equal weight)
# Can upweight ON and Recti if needed
dice_class_weights: null

# --- Optimization ---
learning_rate: 1.0e-4      # for network params, scaled by batch_size
learning_rate_lat: 1.0e-3   # for latent codes, NOT scaled by batch_size
lat_reg_lambda: 1.0e-4      # L2 regularization on latent codes
num_epochs: 1800

# --- Logging & checkpointing ---
log_epoch_count: 1
checkpoint_epoch_count: 100
max_num_checkpoints: 5
num_workers: 2